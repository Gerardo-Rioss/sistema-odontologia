version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: odontologia-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: odontologia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d odontologia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcional: Redis para caché y colas (descomentar cuando se necesite)
  # redis:
  #   image: redis:7-alpine
  #   container_name: odontologia-redis
  #   restart: unless-stopped
